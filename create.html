<!DOCTYPE html>
<head>
    <link rel="stylesheet" type="text/css" href="public/styles/styles.css" />
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Fredericka the Great|Open Sans" />
    <script src="https://kit.fontawesome.com/82392d78a5.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="nav_bar">
            <div class="logo">
                <a href="index.html"><img src="public/images/CodeSquad-Comics-logo.png" /></a>
            </div>
            <div class="logoless_navbar">
                <div class="nav_bar_home">
                    <a href="index.html">HOME</a>
                </div>
                <div class="nav_bar_about">
                    <a href="about.html">ABOUT</a>
                </div>
                <div class="nav_bar_login">
                    <a href="login.html">LOGIN</a>
                </div>
            </div>
        </div>
    
        <div class="content">
            <div class="content_box">
                <span><h1>CREATE NEW COMIC</h1></span>
                <div class="create_form">
                    <form>
                        <div class="create_title">
                            <label for="comic_title">Title:</label>
                            <input type="text" id="comic_title" name="comic_title" value="Title">
                        </div>
                        <div class="create_author">
                            <label for="comic_author">Author:</label>
                            <input type="text" id="comic_author" name="comic_author" value="Author">    
                        </div>
                        <div class="select_publisher">
                            <label for="comic_publisher">Publisher:</label>
                            <select id="comic_publisher" name="comic_publisher">
                                <option value="boom_box">BOOM! Box</option>
                                <option value="dc_comics">DC Comics</option>
                                <option value="harry_n_abrams">Harry N. Abrams</option>
                                <option value="icon_books">Icon Books</option>
                                <option value="image_comics">Image Comics</option>
                                <option value="marvel">Marvel</option>
                                <option value="simon_schuster">Simon & Schuster</option>
                                <option value="top_shelf_prod">Top Shelf Productions</option>
                                <option value="viz_media_llc">VIZ Media LLC</option>
                                <option value="select" selected>Select</option>
                              </select>
                        </div>
                        <div class="create_genre">
                            <label for="comic_genre">Genre:</label><input type="text" id="comic_genre" name="comic_genre" value="Genre">
                        </div>
                        <div class="create_pages">
                            <label for="comic_pages">Number of pages:</label><input type="text" id="comic_pages" name="comic_pages" value="Number of pages">
                        </div>
                        <div class="create_rating">
                            <label for="comic_rating">Rating:</label><input type="text" id="comic_rating" name="comic_rating" size="4">
                        </div>
                        <div class="create_synopsis">
                            <label for="comic_synopsis">Synopsis:</label><textarea id="comic_synopsis" name="comic_synopsis">Synopsis</textarea>
                        </div>
                        
                        <input type="submit" value="Submit">
                      </form>
                </div>
            </div>
        </div>
    
        <div class="footer row">
            <div class="column">
                <span><h2>VISIT US</h2></span>
                <p>ComicSquad Comics</p>
                <p>123 Dorchester Avenue</p>
                <p>Boston, MA 02124</p>      
            </div>
            <div class="column">
                <span><h2>LINKS</h2></span>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </div>
            <div class="column">
                <span><h2>FOLLOW US</h2></span>
                <ul>
                    <li><a href="#" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-facebook"></i></a></li>
                    <li><a href="#" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-square-instagram"></i></a></li>
                    <li><a href="#" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-twitter"></i></a></li>
                </ul>
            </div>
            <div class="column">
                <span><h2>A PRODUCT OF</h2></span>
                <a href="http://codesquad.org/" target="_blank" rel="noopener noreferrer"><img src="/public/images/CodeSquad-logo-a.png" /></a>
            </div>
        </div>
    </div>
</body>
</html>
